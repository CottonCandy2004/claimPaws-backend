spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
notification:
  webhook:
    enabled: false
    connect-timeout: 5000
    read-timeout: 10000
    max-retries: 3
    retry-base-seconds: 5
    encryption-key: MDEyMzQ1Njc4OWFiY2RlZg==
