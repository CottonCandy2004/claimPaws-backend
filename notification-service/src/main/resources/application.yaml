server:
  port: 8084
spring:
  application:
    name: notification-service
  config:
    import: optional:nacos:${NACOS_SERVER_ADDR:127.0.0.1:8848}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:claimpaws_notification}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
management:
  endpoints:
    web:
      exposure:
        include: health
notification:
  webhook:
    enabled: true
    connect-timeout: 5000
    read-timeout: 10000
    max-retries: 3
    retry-base-seconds: 5
    encryption-key: ${WEBHOOK_ENCRYPTION_KEY}
