spring:
  application:
    name: resource-service
  cloud:
    discovery:
      enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  config:
    import: ""
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:tc:mysql:8.0:///claimpaws_resource_test
    username: test
    password: test

mybatis:
  mapper-locations: classpath:mapper/*.xml
