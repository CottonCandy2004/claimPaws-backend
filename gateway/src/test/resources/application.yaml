spring:
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: nowhere:8848
      config:
        enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: identity
              uri: no://op
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - SetStatus=405
