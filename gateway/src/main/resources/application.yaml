server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        import-check:
          enabled: false
    gateway:
      routes:
        - id: identity-auth
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/auth/**
        - id: identity-users
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/users/**
        - id: identity-roles
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/roles/**
        - id: identity-depts
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/departments/**
        - id: resource
          uri: lb://resource-service
          predicates:
            - Path=/api/v1/resources/**
        - id: policy
          uri: lb://resource-service
          predicates:
            - Path=/api/v1/policies/**
        - id: reservation
          uri: lb://reservation-service
          predicates:
            - Path=/api/v1/reservations/**
        - id: approval
          uri: lb://reservation-service
          predicates:
            - Path=/api/v1/approvals/**
        - id: notification
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/webhooks/**

management:
  endpoints:
    web:
      exposure:
        include: health
