server:
  port: 8083
spring:
  application:
    name: reservation-service
  config:
    import: optional:nacos:${NACOS_SERVER_ADDR:127.0.0.1:8848}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:claimpaws_reservation}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
management:
  endpoints:
    web:
      exposure:
        include: health
