spring:
  config:
    activate:
      on-profile: docker
    import: "optional:nacos:${spring.application.name}.yaml?server-addr=${NACOS_SERVER_ADDR:nacos:8848}"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
    openfeign:
      client:
        config:
          resource-service:
            url: http://resource-service:8082
  datasource:
    url: jdbc:mysql://mysql:3306/claimpaws_reservation?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: ${MYSQL_USER:claimpaws}
    password: ${MYSQL_PASSWORD:local-dev-only}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USERNAME:claimpaws}
    password: ${RABBITMQ_PASSWORD:local-dev-only}
    publisher-confirm-type: correlated
    publisher-returns: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083
