spring:
  config:
    activate:
      on-profile: docker
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/claimpaws_reservation?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: ${MYSQL_USER:claimpaws}
    password: ${MYSQL_PASSWORD:local-dev-only}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:claimpaws}
    password: ${RABBITMQ_PASSWORD:local-dev-only}
    publisher-confirm-type: correlated
    publisher-returns: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083
