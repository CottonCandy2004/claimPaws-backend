networks:
  claimpaws-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: local-dev-only
      MYSQL_DATABASE: claimpaws_identity
      MYSQL_USER: claimpaws
      MYSQL_PASSWORD: local-dev-only
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./docker/mysql/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
      - mysql-data:/var/lib/mysql
    networks:
      - claimpaws-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-plocal-dev-only"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - claimpaws-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: claimpaws
      RABBITMQ_DEFAULT_PASS: local-dev-only
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks:
      - claimpaws-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
      NACOS_SERVER_IP: 172.25.0.10
      NACOS_APPLICATION_PORT: "8848"
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"
    networks:
      claimpaws-net:
        ipv4_address: 172.25.0.10
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  identity-service:
    build:
      context: ./identity-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      MYSQL_USER: ${MYSQL_USER:-claimpaws}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-dev-only}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-32-bytes}
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - claimpaws-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  resource-service:
    build:
      context: ./resource-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      MYSQL_USER: ${MYSQL_USER:-claimpaws}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-dev-only}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
    ports:
      - "127.0.0.1:8082:8082"
    networks:
      - claimpaws-net
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  reservation-service:
    build:
      context: ./reservation-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      MYSQL_USER: ${MYSQL_USER:-claimpaws}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-dev-only}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-claimpaws}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-local-dev-only}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
    ports:
      - "127.0.0.1:8083:8083"
    networks:
      - claimpaws-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      MYSQL_USER: ${MYSQL_USER:-claimpaws}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-dev-only}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-claimpaws}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-local-dev-only}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      WEBHOOK_ENCRYPTION_KEY: ${WEBHOOK_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZg==}
    ports:
      - "127.0.0.1:8084:8084"
    networks:
      - claimpaws-net
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - claimpaws-net
    depends_on:
      nacos:
        condition: service_healthy
      identity-service:
        condition: service_started
      resource-service:
        condition: service_started
      reservation-service:
        condition: service_started
      notification-service:
        condition: service_started

volumes:
  mysql-data:
