services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: local-dev-only
      MYSQL_DATABASE: claimpaws_identity
      MYSQL_USER: claimpaws
      MYSQL_PASSWORD: local-dev-only
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./docker/mysql/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-plocal-dev-only"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: claimpaws
      RABBITMQ_DEFAULT_PASS: local-dev-only
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
